<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#E65100" font-family="sans-serif">🔢 排列和序列 Ordering &amp; Sequences</text>
  <!-- Ascending order -->
  <text x="320" y="78" text-anchor="middle" font-size="15" fill="#BF360C" font-family="sans-serif">由小到大排列</text>
  <!-- Number boxes ascending -->
  <rect x="60" y="90" width="60" height="50" rx="8" fill="#FFCCBC" stroke="#E64A19" stroke-width="2"/>
  <text x="90" y="123" text-anchor="middle" font-size="24" font-weight="bold" fill="#BF360C" font-family="sans-serif">3</text>
  <text x="145" y="123" text-anchor="middle" font-size="24" fill="#E65100" font-family="sans-serif">→</text>
  <rect x="170" y="90" width="60" height="50" rx="8" fill="#FFE0B2" stroke="#E64A19" stroke-width="2"/>
  <text x="200" y="123" text-anchor="middle" font-size="24" font-weight="bold" fill="#BF360C" font-family="sans-serif">7</text>
  <text x="255" y="123" text-anchor="middle" font-size="24" fill="#E65100" font-family="sans-serif">→</text>
  <rect x="280" y="90" width="60" height="50" rx="8" fill="#FFF3E0" stroke="#E64A19" stroke-width="2"/>
  <text x="310" y="123" text-anchor="middle" font-size="24" font-weight="bold" fill="#BF360C" font-family="sans-serif">12</text>
  <text x="365" y="123" text-anchor="middle" font-size="24" fill="#E65100" font-family="sans-serif">→</text>
  <rect x="390" y="90" width="60" height="50" rx="8" fill="#FFF8E1" stroke="#E64A19" stroke-width="2"/>
  <text x="420" y="123" text-anchor="middle" font-size="24" font-weight="bold" fill="#BF360C" font-family="sans-serif">15</text>
  <text x="475" y="123" text-anchor="middle" font-size="24" fill="#E65100" font-family="sans-serif">→</text>
  <rect x="500" y="90" width="60" height="50" rx="8" fill="#FFFFFF" stroke="#E64A19" stroke-width="2"/>
  <text x="530" y="123" text-anchor="middle" font-size="24" font-weight="bold" fill="#BF360C" font-family="sans-serif">19</text>
  <!-- Pattern sequence -->
  <text x="320" y="175" text-anchor="middle" font-size="15" fill="#BF360C" font-family="sans-serif">找出規律，填寫 ？</text>
  <rect x="80" y="190" width="480" height="55" rx="10" fill="#FFFFFF" stroke="#FFA726" stroke-width="2"/>
  <!-- Pattern: 2, 4, 6, 8, ? -->
  <text x="130" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#E65100" font-family="sans-serif">2</text>
  <text x="200" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#E65100" font-family="sans-serif">4</text>
  <text x="270" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#E65100" font-family="sans-serif">6</text>
  <text x="340" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#E65100" font-family="sans-serif">8</text>
  <text x="410" y="225" text-anchor="middle" font-size="28" font-weight="bold" fill="#E53935" font-family="sans-serif">?</text>
  <!-- +2 hints -->
  <text x="165" y="210" text-anchor="middle" font-size="13" fill="#FF8F00" font-family="sans-serif">+2</text>
  <text x="235" y="210" text-anchor="middle" font-size="13" fill="#FF8F00" font-family="sans-serif">+2</text>
  <text x="305" y="210" text-anchor="middle" font-size="13" fill="#FF8F00" font-family="sans-serif">+2</text>
  <text x="375" y="210" text-anchor="middle" font-size="13" fill="#FF8F00" font-family="sans-serif">+2</text>
  <!-- Answer reveal -->
  <rect x="180" y="260" width="280" height="42" rx="12" fill="#E65100" opacity="0.1"/>
  <text x="320" y="288" text-anchor="middle" font-size="20" font-weight="bold" fill="#BF360C" font-family="sans-serif">答案：? = 10 （每次加2）</text>
  <!-- Shape pattern -->
  <text x="320" y="325" text-anchor="middle" font-size="15" fill="#BF360C" font-family="sans-serif">圖形規律</text>
  <text x="140" y="352" font-size="28" font-family="sans-serif">🔴</text>
  <text x="200" y="352" font-size="28" font-family="sans-serif">🔵</text>
  <text x="260" y="352" font-size="28" font-family="sans-serif">🔴</text>
  <text x="320" y="352" font-size="28" font-family="sans-serif">🔵</text>
  <text x="380" y="352" font-size="28" font-family="sans-serif">🔴</text>
  <text x="440" y="352" text-anchor="middle" font-size="28" font-weight="bold" fill="#E53935" font-family="sans-serif">?</text>
</svg>