<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8E1"/>
      <stop offset="100%" style="stop-color:#FFECB3"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#E65100" font-family="sans-serif">🔢 數數 Counting</text>
  <!-- Row 1: apples 1-5 -->
  <text x="80" y="120" font-size="44" font-family="sans-serif">🍎</text>
  <text x="80" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">1</text>
  <text x="170" y="120" font-size="44" font-family="sans-serif">🍎</text>
  <text x="170" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">2</text>
  <text x="260" y="120" font-size="44" font-family="sans-serif">🍎</text>
  <text x="260" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">3</text>
  <text x="350" y="120" font-size="44" font-family="sans-serif">🍎</text>
  <text x="350" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">4</text>
  <text x="440" y="120" font-size="44" font-family="sans-serif">🍎</text>
  <text x="440" y="148" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">5</text>
  <!-- Row 2: apples 6-10 -->
  <text x="80" y="210" font-size="44" font-family="sans-serif">🍎</text>
  <text x="80" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">6</text>
  <text x="170" y="210" font-size="44" font-family="sans-serif">🍎</text>
  <text x="170" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">7</text>
  <text x="260" y="210" font-size="44" font-family="sans-serif">🍎</text>
  <text x="260" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">8</text>
  <text x="350" y="210" font-size="44" font-family="sans-serif">🍎</text>
  <text x="350" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">9</text>
  <text x="440" y="210" font-size="44" font-family="sans-serif">🍎</text>
  <text x="440" y="238" text-anchor="middle" font-size="16" font-weight="bold" fill="#C62828" font-family="sans-serif" dx="22">10</text>
  <!-- Total -->
  <rect x="520" y="130" width="100" height="80" rx="16" fill="#FF6F00" opacity="0.15"/>
  <text x="570" y="182" text-anchor="middle" font-size="48" font-weight="bold" fill="#E65100" font-family="sans-serif">10</text>
  <text x="320" y="320" text-anchor="middle" font-size="20" fill="#795548" font-family="sans-serif">數一數，一共有幾個蘋果？</text>
</svg>
