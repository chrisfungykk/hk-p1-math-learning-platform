<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC"/>
      <stop offset="100%" style="stop-color:#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#AD1457" font-family="sans-serif">➖ 基本減法 Subtraction within 10</text>
  <!-- 8 fish, 3 crossed out -->
  <text x="60" y="140" font-size="40" font-family="sans-serif">🐟</text>
  <text x="120" y="140" font-size="40" font-family="sans-serif">🐟</text>
  <text x="180" y="140" font-size="40" font-family="sans-serif">🐟</text>
  <text x="240" y="140" font-size="40" font-family="sans-serif">🐟</text>
  <text x="300" y="140" font-size="40" font-family="sans-serif">🐟</text>
  <!-- Crossed out fish -->
  <text x="390" y="140" font-size="40" font-family="sans-serif" opacity="0.35">🐟</text>
  <line x1="390" y1="108" x2="430" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <line x1="430" y1="108" x2="390" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <text x="450" y="140" font-size="40" font-family="sans-serif" opacity="0.35">🐟</text>
  <line x1="450" y1="108" x2="490" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <line x1="490" y1="108" x2="450" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <text x="510" y="140" font-size="40" font-family="sans-serif" opacity="0.35">🐟</text>
  <line x1="510" y1="108" x2="550" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <line x1="550" y1="108" x2="510" y2="148" stroke="#C62828" stroke-width="3" stroke-linecap="round"/>
  <!-- Bracket showing removal -->
  <text x="320" y="200" text-anchor="middle" font-size="18" fill="#880E4F" font-family="sans-serif">游走了 3 條</text>
  <!-- Arrow -->
  <line x1="320" y1="210" x2="320" y2="240" stroke="#AD1457" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Equation -->
  <rect x="160" y="250" width="320" height="55" rx="14" fill="#AD1457" opacity="0.1"/>
  <text x="320" y="288" text-anchor="middle" font-size="34" font-weight="bold" fill="#AD1457" font-family="sans-serif">8 − 3 = 5</text>
  <text x="320" y="340" text-anchor="middle" font-size="18" fill="#795548" font-family="sans-serif">池塘裡還剩 5 條魚</text>
</svg>
