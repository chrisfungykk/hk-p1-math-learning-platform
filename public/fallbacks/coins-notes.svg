<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF3E0"/>
      <stop offset="100%" style="stop-color:#FFE0B2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F"/>
      <stop offset="100%" style="stop-color:#FFA000"/>
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E0E0"/>
      <stop offset="100%" style="stop-color:#9E9E9E"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#E65100" font-family="sans-serif">🪙 認識貨幣 Coins &amp; Notes</text>
  <!-- Coins row -->
  <text x="200" y="78" text-anchor="middle" font-size="15" fill="#BF360C" font-family="sans-serif">硬幣 Coins</text>
  <!-- 10¢ -->
  <circle cx="70" cy="130" r="28" fill="url(#silver)" stroke="#757575" stroke-width="2"/>
  <text x="70" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242" font-family="sans-serif">香港</text>
  <text x="70" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242" font-family="sans-serif">1毫</text>
  <!-- 20¢ -->
  <circle cx="145" cy="130" r="28" fill="url(#silver)" stroke="#757575" stroke-width="2"/>
  <text x="145" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#424242" font-family="sans-serif">香港</text>
  <text x="145" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242" font-family="sans-serif">2毫</text>
  <!-- 50¢ -->
  <circle cx="220" cy="130" r="30" fill="url(#gold)" stroke="#F57F17" stroke-width="2"/>
  <text x="220" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="sans-serif">香港</text>
  <text x="220" y="142" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">5毫</text>
  <!-- $1 -->
  <circle cx="300" cy="130" r="30" fill="url(#gold)" stroke="#F57F17" stroke-width="2"/>
  <text x="300" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="sans-serif">香港</text>
  <text x="300" y="142" text-anchor="middle" font-size="16" font-weight="bold" fill="#5D4037" font-family="sans-serif">$1</text>
  <!-- $2 -->
  <circle cx="378" cy="130" r="30" fill="url(#gold)" stroke="#F57F17" stroke-width="2"/>
  <text x="378" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="sans-serif">香港</text>
  <text x="378" y="142" text-anchor="middle" font-size="16" font-weight="bold" fill="#5D4037" font-family="sans-serif">$2</text>
  <!-- $5 -->
  <circle cx="456" cy="130" r="32" fill="url(#gold)" stroke="#E65100" stroke-width="2.5"/>
  <text x="456" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="sans-serif">香港</text>
  <text x="456" y="144" text-anchor="middle" font-size="18" font-weight="bold" fill="#5D4037" font-family="sans-serif">$5</text>
  <!-- $10 -->
  <circle cx="540" cy="130" r="34" fill="url(#gold)" stroke="#BF360C" stroke-width="2.5"/>
  <text x="540" y="126" text-anchor="middle" font-size="11" font-weight="bold" fill="#5D4037" font-family="sans-serif">香港</text>
  <text x="540" y="144" text-anchor="middle" font-size="18" font-weight="bold" fill="#5D4037" font-family="sans-serif">$10</text>
  <!-- Notes row -->
  <text x="320" y="200" text-anchor="middle" font-size="15" fill="#BF360C" font-family="sans-serif">紙幣 Notes</text>
  <!-- $20 note -->
  <rect x="60" y="215" width="110" height="55" rx="6" fill="#81D4FA" stroke="#0277BD" stroke-width="2"/>
  <text x="115" y="248" text-anchor="middle" font-size="22" font-weight="bold" fill="#01579B" font-family="sans-serif">$20</text>
  <!-- $50 note -->
  <rect x="195" y="215" width="110" height="55" rx="6" fill="#CE93D8" stroke="#7B1FA2" stroke-width="2"/>
  <text x="250" y="248" text-anchor="middle" font-size="22" font-weight="bold" fill="#4A148C" font-family="sans-serif">$50</text>
  <!-- $100 note -->
  <rect x="330" y="215" width="110" height="55" rx="6" fill="#EF9A9A" stroke="#C62828" stroke-width="2"/>
  <text x="385" y="248" text-anchor="middle" font-size="22" font-weight="bold" fill="#B71C1C" font-family="sans-serif">$100</text>
  <!-- $500 note -->
  <rect x="465" y="215" width="110" height="55" rx="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2"/>
  <text x="520" y="248" text-anchor="middle" font-size="22" font-weight="bold" fill="#1B5E20" font-family="sans-serif">$500</text>
  <!-- Example -->
  <rect x="130" y="290" width="380" height="48" rx="14" fill="#E65100" opacity="0.1"/>
  <text x="320" y="322" text-anchor="middle" font-size="20" fill="#BF360C" font-family="sans-serif">🪙🪙🪙 $5 + $2 + $1 = $8</text>
</svg>