<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <rect width="640" height="360" fill="#FFF8E1"/>
  <text x="320" y="45" text-anchor="middle" font-size="28" font-weight="bold" fill="#E65100" font-family="sans-serif">認識貨幣 Coins &amp; Notes</text>
  <!-- Coins -->
  <circle cx="100" cy="150" r="30" fill="#8D6E63" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="100" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$0.10</text>
  <text x="100" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">1角</text>
  <circle cx="200" cy="150" r="30" fill="#FFB300" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="200" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$0.50</text>
  <text x="200" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">5角</text>
  <circle cx="300" cy="150" r="30" fill="#FDD835" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="300" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$1</text>
  <text x="300" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">1元</text>
  <circle cx="400" cy="150" r="30" fill="#66BB6A" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="400" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$2</text>
  <text x="400" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">2元</text>
  <!-- Notes -->
  <rect x="460" y="120" width="72" height="40" rx="6" fill="#42A5F5" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="496" y="145" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$10</text>
  <text x="496" y="200" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">10元</text>
  <rect x="460" y="240" width="72" height="40" rx="6" fill="#AB47BC" stroke="rgba(0,0,0,0.15)" stroke-width="2"/>
  <text x="496" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFF" font-family="sans-serif">$20</text>
  <text x="496" y="310" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">20元</text>
</svg>