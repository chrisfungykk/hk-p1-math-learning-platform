<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#C8E6C9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#2E7D32" font-family="sans-serif">🧮 20以內加法 Addition within 20</text>
  <!-- Ten-frame left: 9 dots -->
  <rect x="50" y="80" width="220" height="120" rx="10" fill="#FFF" stroke="#43A047" stroke-width="2"/>
  <circle cx="80" cy="110" r="14" fill="#43A047"/><circle cx="130" cy="110" r="14" fill="#43A047"/>
  <circle cx="180" cy="110" r="14" fill="#43A047"/><circle cx="230" cy="110" r="14" fill="#43A047"/>
  <circle cx="80" cy="160" r="14" fill="#43A047"/><circle cx="130" cy="160" r="14" fill="#43A047"/>
  <circle cx="180" cy="160" r="14" fill="#43A047"/><circle cx="230" cy="160" r="14" fill="#43A047"/>
  <circle cx="80" cy="160" r="14" fill="#43A047"/>
  <text x="160" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#2E7D32" font-family="sans-serif">9</text>
  <!-- Plus -->
  <circle cx="320" cy="140" r="24" fill="#2E7D32"/>
  <text x="320" y="150" text-anchor="middle" font-size="32" font-weight="bold" fill="#FFF" font-family="sans-serif">+</text>
  <!-- Ten-frame right: 6 dots -->
  <rect x="370" y="80" width="220" height="120" rx="10" fill="#FFF" stroke="#66BB6A" stroke-width="2"/>
  <circle cx="400" cy="110" r="14" fill="#66BB6A"/><circle cx="450" cy="110" r="14" fill="#66BB6A"/>
  <circle cx="500" cy="110" r="14" fill="#66BB6A"/><circle cx="550" cy="110" r="14" fill="#66BB6A"/>
  <circle cx="400" cy="160" r="14" fill="#66BB6A"/><circle cx="450" cy="160" r="14" fill="#66BB6A"/>
  <text x="480" y="230" text-anchor="middle" font-size="20" font-weight="bold" fill="#2E7D32" font-family="sans-serif">6</text>
  <!-- 湊十法 hint -->
  <rect x="120" y="255" width="400" height="40" rx="10" fill="#FFF" stroke="#81C784" stroke-width="1.5"/>
  <text x="320" y="282" text-anchor="middle" font-size="16" fill="#388E3C" font-family="sans-serif">湊十法：9 + 1 = 10，10 + 5 = 15</text>
  <!-- Equation -->
  <rect x="180" y="300" width="280" height="48" rx="14" fill="#2E7D32" opacity="0.12"/>
  <text x="320" y="334" text-anchor="middle" font-size="32" font-weight="bold" fill="#1B5E20" font-family="sans-serif">9 + 6 = 15</text>
</svg>
