<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <rect width="640" height="360" fill="#E1F5FE"/>
  <text x="320" y="50" text-anchor="middle" font-size="28" font-weight="bold" fill="#0277BD" font-family="sans-serif">20以內加法 Addition (20)</text>
  <text x="80" y="140" font-size="28" font-family="sans-serif">⭐⭐⭐⭐⭐</text>
  <text x="80" y="180" font-size="28" font-family="sans-serif">⭐⭐⭐</text>
  <text x="340" y="160" font-size="36" font-weight="bold" fill="#0277BD" font-family="sans-serif">+</text>
  <text x="400" y="140" font-size="28" font-family="sans-serif">⭐⭐⭐</text>
  <text x="400" y="180" font-size="28" font-family="sans-serif">⭐⭐</text>
  <text x="320" y="280" text-anchor="middle" font-size="36" font-weight="bold" fill="#0277BD" font-family="sans-serif">8 + 5 = 13</text>
</svg>