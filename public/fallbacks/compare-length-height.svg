<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F7FA"/>
      <stop offset="100%" style="stop-color:#B2EBF2"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#00695C" font-family="sans-serif">📏 比較長短和高矮 Compare Length &amp; Height</text>
  <!-- Height comparison (left side) -->
  <text x="170" y="78" text-anchor="middle" font-size="15" fill="#00796B" font-family="sans-serif">比較高矮</text>
  <!-- Ground line -->
  <line x1="50" y1="280" x2="300" y2="280" stroke="#00897B" stroke-width="2"/>
  <!-- Tall tree -->
  <rect x="90" y="140" width="20" height="140" fill="#795548"/>
  <circle cx="100" cy="120" r="40" fill="#66BB6A"/>
  <text x="100" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#2E7D32" font-family="sans-serif">高</text>
  <!-- Height arrow -->
  <line x1="65" y1="80" x2="65" y2="280" stroke="#E53935" stroke-width="2"/>
  <polygon points="65,80 60,92 70,92" fill="#E53935"/>
  <polygon points="65,280 60,268 70,268" fill="#E53935"/>
  <!-- Short flower -->
  <rect x="210" y="240" width="8" height="40" fill="#66BB6A"/>
  <circle cx="214" cy="230" r="18" fill="#F48FB1"/>
  <circle cx="214" cy="230" r="8" fill="#FFF176"/>
  <text x="214" y="300" text-anchor="middle" font-size="13" font-weight="bold" fill="#C62828" font-family="sans-serif">矮</text>
  <!-- Length comparison (right side) -->
  <text x="480" y="78" text-anchor="middle" font-size="15" fill="#00796B" font-family="sans-serif">比較長短</text>
  <!-- Long pencil -->
  <rect x="350" y="120" width="240" height="18" rx="3" fill="#FFF176" stroke="#F9A825" stroke-width="1.5"/>
  <polygon points="590,120 610,129 590,138" fill="#FFB74D"/>
  <rect x="350" y="120" width="20" height="18" rx="3" fill="#EF9A9A"/>
  <text x="480" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#F57F17" font-family="sans-serif">長</text>
  <!-- Short pencil -->
  <rect x="350" y="180" width="120" height="18" rx="3" fill="#90CAF9" stroke="#1E88E5" stroke-width="1.5"/>
  <polygon points="470,180 490,189 470,198" fill="#FFB74D"/>
  <rect x="350" y="180" width="20" height="18" rx="3" fill="#EF9A9A"/>
  <text x="410" y="215" text-anchor="middle" font-size="13" font-weight="bold" fill="#1565C0" font-family="sans-serif">短</text>
  <!-- Ruler at bottom -->
  <rect x="340" y="245" width="270" height="25" rx="4" fill="#FFFFFF" stroke="#00897B" stroke-width="1.5"/>
  <line x1="370" y1="245" x2="370" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="400" y1="245" x2="400" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="430" y1="245" x2="430" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="460" y1="245" x2="460" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="490" y1="245" x2="490" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="520" y1="245" x2="520" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="550" y1="245" x2="550" y2="270" stroke="#00897B" stroke-width="1"/>
  <line x1="580" y1="245" x2="580" y2="270" stroke="#00897B" stroke-width="1"/>
  <text x="475" y="300" text-anchor="middle" font-size="14" fill="#00695C" font-family="sans-serif">用間尺量度長度</text>
  <!-- Bottom hint -->
  <rect x="100" y="318" width="440" height="34" rx="10" fill="#00695C" opacity="0.1"/>
  <text x="320" y="342" text-anchor="middle" font-size="16" fill="#004D40" font-family="sans-serif">邊個高啲？邊枝筆長啲？用眼睛同間尺比較！</text>
</svg>