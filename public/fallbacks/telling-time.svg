<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <rect width="640" height="360" fill="#FFFDE7"/>
  <text x="320" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#F57F17" font-family="sans-serif">認識時間 Telling Time</text>
  <circle cx="320" cy="180" r="90" fill="#FFF" stroke="#5D4037" stroke-width="4"/>
  <!-- Hour numbers -->
  <text x="320" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">12</text>
  <text x="365" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">1</text>
  <text x="393" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">2</text>
  <text x="400" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">3</text>
  <text x="393" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">4</text>
  <text x="365" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">5</text>
  <text x="320" y="258" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">6</text>
  <text x="275" y="248" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">7</text>
  <text x="247" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">8</text>
  <text x="240" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">9</text>
  <text x="247" y="145" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">10</text>
  <text x="275" y="118" text-anchor="middle" font-size="14" font-weight="bold" fill="#5D4037" font-family="sans-serif">11</text>
  <!-- Hour hand pointing to 3 -->
  <line x1="320" y1="180" x2="370" y2="180" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
  <!-- Minute hand pointing to 12 -->
  <line x1="320" y1="180" x2="320" y2="110" stroke="#E53935" stroke-width="2" stroke-linecap="round"/>
  <circle cx="320" cy="180" r="4" fill="#5D4037"/>
  <text x="320" y="330" text-anchor="middle" font-size="24" font-weight="bold" fill="#F57F17" font-family="sans-serif">3 時正</text>
</svg>