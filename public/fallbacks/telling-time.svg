<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E5F5"/>
      <stop offset="100%" style="stop-color:#E1BEE7"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#6A1B9A" font-family="sans-serif">🕐 認識時間 Telling Time</text>
  <!-- Clock face -->
  <circle cx="200" cy="190" r="110" fill="#FFFFFF" stroke="#7B1FA2" stroke-width="4"/>
  <circle cx="200" cy="190" r="6" fill="#7B1FA2"/>
  <!-- Hour markers -->
  <text x="200" y="100" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C" font-family="sans-serif">12</text>
  <text x="255" y="110" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">1</text>
  <text x="290" y="145" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">2</text>
  <text x="305" y="195" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C" font-family="sans-serif">3</text>
  <text x="290" y="245" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">4</text>
  <text x="255" y="275" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">5</text>
  <text x="200" y="285" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C" font-family="sans-serif">6</text>
  <text x="145" y="275" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">7</text>
  <text x="110" y="245" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">8</text>
  <text x="95" y="195" text-anchor="middle" font-size="18" font-weight="bold" fill="#4A148C" font-family="sans-serif">9</text>
  <text x="110" y="145" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">10</text>
  <text x="145" y="110" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">11</text>
  <!-- Hour hand (pointing to 3) -->
  <line x1="200" y1="190" x2="260" y2="190" stroke="#4A148C" stroke-width="5" stroke-linecap="round"/>
  <!-- Minute hand (pointing to 12) -->
  <line x1="200" y1="190" x2="200" y2="105" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round"/>
  <!-- Time labels on right side -->
  <rect x="360" y="100" width="240" height="60" rx="12" fill="#FFFFFF" stroke="#CE93D8" stroke-width="2"/>
  <text x="480" y="125" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">長針指向 12</text>
  <text x="480" y="148" text-anchor="middle" font-size="16" fill="#6A1B9A" font-family="sans-serif">短針指向 3</text>
  <!-- Answer -->
  <rect x="380" y="180" width="200" height="50" rx="14" fill="#6A1B9A" opacity="0.12"/>
  <text x="480" y="212" text-anchor="middle" font-size="28" font-weight="bold" fill="#4A148C" font-family="sans-serif">3 時正</text>
  <!-- Daily schedule hint -->
  <rect x="350" y="255" width="260" height="80" rx="10" fill="#FFFFFF" stroke="#CE93D8" stroke-width="1.5"/>
  <text x="480" y="278" text-anchor="middle" font-size="14" fill="#7B1FA2" font-family="sans-serif">⏰ 日常時間</text>
  <text x="480" y="300" text-anchor="middle" font-size="13" fill="#6A1B9A" font-family="sans-serif">7時 起床 🌅  12時 午餐 🍱</text>
  <text x="480" y="320" text-anchor="middle" font-size="13" fill="#6A1B9A" font-family="sans-serif">3時 放學 🏫  9時 睡覺 🌙</text>
  <!-- Bottom hint -->
  <text x="320" y="352" text-anchor="middle" font-size="15" fill="#8E24AA" font-family="sans-serif">認識鐘面，學會睇時間！</text>
</svg>