<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3F2FD"/>
      <stop offset="100%" style="stop-color:#BBDEFB"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#1565C0" font-family="sans-serif">➕ 基本加法 Addition within 10</text>
  <!-- Left group: 3 stars -->
  <circle cx="100" cy="155" r="30" fill="#1E88E5" opacity="0.15"/>
  <text x="86" y="168" font-size="36" font-family="sans-serif">⭐</text>
  <circle cx="175" cy="155" r="30" fill="#1E88E5" opacity="0.15"/>
  <text x="161" y="168" font-size="36" font-family="sans-serif">⭐</text>
  <circle cx="250" cy="155" r="30" fill="#1E88E5" opacity="0.15"/>
  <text x="236" y="168" font-size="36" font-family="sans-serif">⭐</text>
  <!-- Plus sign -->
  <circle cx="320" cy="155" r="22" fill="#1565C0"/>
  <text x="320" y="165" text-anchor="middle" font-size="30" font-weight="bold" fill="#FFF" font-family="sans-serif">+</text>
  <!-- Right group: 4 stars -->
  <circle cx="390" cy="155" r="30" fill="#42A5F5" opacity="0.15"/>
  <text x="376" y="168" font-size="36" font-family="sans-serif">⭐</text>
  <circle cx="465" cy="155" r="30" fill="#42A5F5" opacity="0.15"/>
  <text x="451" y="168" font-size="36" font-family="sans-serif">⭐</text>
  <circle cx="390" cy="225" r="30" fill="#42A5F5" opacity="0.15"/>
  <text x="376" y="238" font-size="36" font-family="sans-serif">⭐</text>
  <circle cx="465" cy="225" r="30" fill="#42A5F5" opacity="0.15"/>
  <text x="451" y="238" font-size="36" font-family="sans-serif">⭐</text>
  <!-- Equation -->
  <rect x="140" y="280" width="360" height="55" rx="14" fill="#1565C0" opacity="0.1"/>
  <text x="320" y="318" text-anchor="middle" font-size="34" font-weight="bold" fill="#1565C0" font-family="sans-serif">3 + 4 = 7</text>
</svg>
