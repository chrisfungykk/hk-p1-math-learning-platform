<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FCE4EC"/>
      <stop offset="100%" style="stop-color:#F8BBD0"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="44" text-anchor="middle" font-size="26" font-weight="bold" fill="#AD1457" font-family="sans-serif">🧩 圖形拼砌 Composing Shapes</text>
  <!-- Left side: individual shapes -->
  <text x="150" y="78" text-anchor="middle" font-size="15" fill="#C2185B" font-family="sans-serif">用這些圖形…</text>
  <!-- Triangle 1 -->
  <polygon points="100,120 70,180 130,180" fill="#FFCDD2" stroke="#E53935" stroke-width="2"/>
  <!-- Triangle 2 -->
  <polygon points="200,120 170,180 230,180" fill="#C8E6C9" stroke="#43A047" stroke-width="2"/>
  <!-- Square -->
  <rect x="80" y="200" width="60" height="60" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
  <!-- Small triangle -->
  <polygon points="210,200 180,260 240,260" fill="#FFF9C4" stroke="#FDD835" stroke-width="2"/>
  <!-- Arrow -->
  <text x="300" y="180" text-anchor="middle" font-size="40" fill="#AD1457" font-family="sans-serif">→</text>
  <!-- Right side: composed house shape -->
  <text x="480" y="78" text-anchor="middle" font-size="15" fill="#C2185B" font-family="sans-serif">拼成新圖形！</text>
  <!-- House: roof (triangle) -->
  <polygon points="480,100 410,175 550,175" fill="#FFCDD2" stroke="#E53935" stroke-width="2.5"/>
  <!-- House: body (rectangle) -->
  <rect x="420" y="175" width="120" height="100" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2.5"/>
  <!-- House: door -->
  <rect x="460" y="225" width="40" height="50" fill="#FFF9C4" stroke="#FDD835" stroke-width="2"/>
  <!-- House: window -->
  <rect x="430" y="190" width="25" height="25" fill="#C8E6C9" stroke="#43A047" stroke-width="2"/>
  <!-- House label -->
  <text x="480" y="300" text-anchor="middle" font-size="16" font-weight="bold" fill="#AD1457" font-family="sans-serif">🏠 小屋</text>
  <!-- Bottom hint -->
  <rect x="130" y="310" width="380" height="38" rx="12" fill="#AD1457" opacity="0.1"/>
  <text x="320" y="336" text-anchor="middle" font-size="16" fill="#880E4F" font-family="sans-serif">三角形 + 長方形 = 小屋形狀</text>
</svg>