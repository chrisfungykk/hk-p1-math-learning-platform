<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EDE7F6"/>
      <stop offset="100%" style="stop-color:#D1C4E9"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)" rx="16"/>
  <text x="320" y="48" text-anchor="middle" font-size="26" font-weight="bold" fill="#4527A0" font-family="sans-serif">📐 20以內減法 Subtraction within 20</text>
  <!-- Number line -->
  <line x1="60" y1="150" x2="580" y2="150" stroke="#5E35B1" stroke-width="3"/>
  <!-- Ticks and numbers 0-20 (every 2) -->
  <line x1="60" y1="140" x2="60" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="60" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">0</text>
  <line x1="112" y1="140" x2="112" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="112" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">2</text>
  <line x1="164" y1="140" x2="164" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="164" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">4</text>
  <line x1="216" y1="140" x2="216" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="216" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">6</text>
  <line x1="268" y1="140" x2="268" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="268" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">8</text>
  <line x1="320" y1="135" x2="320" y2="165" stroke="#5E35B1" stroke-width="3"/>
  <text x="320" y="178" text-anchor="middle" font-size="14" font-weight="bold" fill="#4527A0" font-family="sans-serif">10</text>
  <line x1="372" y1="140" x2="372" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="372" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">12</text>
  <line x1="424" y1="140" x2="424" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="424" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">14</text>
  <line x1="476" y1="140" x2="476" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="476" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">16</text>
  <line x1="528" y1="140" x2="528" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="528" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">18</text>
  <line x1="580" y1="140" x2="580" y2="160" stroke="#5E35B1" stroke-width="2"/>
  <text x="580" y="178" text-anchor="middle" font-size="14" fill="#4527A0" font-family="sans-serif">20</text>
  <!-- Jump arc from 15 to 8 (subtract 7) -->
  <circle cx="450" cy="140" r="6" fill="#E53935"/>
  <text x="450" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#E53935" font-family="sans-serif">15</text>
  <path d="M 445,130 Q 360,80 275,130" fill="none" stroke="#E53935" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="360" y="90" text-anchor="middle" font-size="14" font-weight="bold" fill="#E53935" font-family="sans-serif">−7</text>
  <circle cx="268" cy="140" r="6" fill="#1B5E20"/>
  <text x="268" y="125" text-anchor="middle" font-size="13" font-weight="bold" fill="#1B5E20" font-family="sans-serif">8</text>
  <!-- 破十法 hint -->
  <rect x="120" y="210" width="400" height="40" rx="10" fill="#FFF" stroke="#B39DDB" stroke-width="1.5"/>
  <text x="320" y="237" text-anchor="middle" font-size="16" fill="#4527A0" font-family="sans-serif">破十法：15 − 5 = 10，10 − 2 = 8</text>
  <!-- Equation -->
  <rect x="180" y="265" width="280" height="48" rx="14" fill="#4527A0" opacity="0.1"/>
  <text x="320" y="299" text-anchor="middle" font-size="32" font-weight="bold" fill="#4527A0" font-family="sans-serif">15 − 7 = 8</text>
  <text x="320" y="340" text-anchor="middle" font-size="16" fill="#7E57C2" font-family="sans-serif">用數線跳回去找答案</text>
</svg>
